<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bot 菜单可视化编辑器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app visual-editor">
    <header class="topbar panel">
      <div class="brand-block">
        <p class="kicker">Visual Menu Editor</p>
        <h1>Bot 菜单可视化编辑器 <span id="saveState" class="save-state">已保存</span></h1>
      </div>

      <div class="topbar-main">
        <label class="scheme-field">
          <span>菜单方案</span>
          <select id="schemeSelect"></select>
        </label>
        <input id="itemSearch" class="top-search" type="search" placeholder="搜索卡片：标题 / 指令 / 描述" />
      </div>

      <div class="topbar-actions">
        <button id="newBtn" type="button">新建</button>
        <button id="copyBtn" type="button">复制</button>
        <button id="deleteBtn" type="button" class="danger">删除</button>
        <button id="exportBtn" type="button">导出</button>
        <label class="import-chip">
          <input id="importInput" type="file" accept="application/json,.json" />
          <span>导入</span>
        </label>
        <button id="saveBtn" type="button" class="primary">保存</button>
      </div>
    </header>

    <main class="preview-stage">
      <section class="panel preview-panel">
        <div class="preview-head compact-head">
          <div>
            <p class="kicker">Click Layers</p>
            <h2>点击预览层直接编辑</h2>
          </div>
          <div class="preview-actions">
            <span class="hint-pill">外框=主题</span>
            <span class="hint-pill">内容层=全部分组</span>
            <span class="hint-pill">分组=卡片列表</span>
            <span class="hint-pill">小卡片=内容</span>
            <button id="backgroundEditToggleBtn" type="button" class="bg-edit-toggle" aria-pressed="false">编辑背景图</button>
            <span id="previewMeta" class="preview-meta"></span>
          </div>
        </div>
        <div id="validationSummary" class="validation-summary" hidden></div>
        <div id="renderStatus" class="render-status" hidden>缓存状态待更新</div>
        <div id="status" class="status">正在加载...</div>
        <div id="preview" class="menu-preview"></div>
      </section>
    </main>
  </div>

  <div id="editorModal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-card panel">
      <header class="modal-head">
        <div>
          <p class="kicker">Layer Editor</p>
          <h2 id="modalTitle">编辑</h2>
        </div>
        <button type="button" class="icon-button" data-close-modal aria-label="关闭">×</button>
      </header>
      <div id="modalBody" class="modal-body"></div>
      <footer id="modalFooter" class="modal-footer"></footer>
    </section>
  </div>

  <div class="backing-controls" aria-hidden="true">
    <input id="menuId" autocomplete="off" />
    <input id="menuName" />
    <input id="menuTitle" />
    <input id="menuSubtitle" />
    <input id="menuFooter" />
    <select id="theme"><option value="aurora">Aurora</option><option value="minimal">Minimal</option><option value="midnight">Midnight</option><option value="forest">Forest</option><option value="sunrise">Sunrise</option></select>
    <div id="themePresetCards"></div>
    <input id="primaryColor" type="color" />
    <input id="backgroundColor" type="color" />
    <input id="backgroundImageInput" type="file" accept="image/*" />
    <small id="backgroundImageName">No background image</small>
    <input id="backgroundImageWidth" type="range" min="10" max="600" step="1" />
    <output id="backgroundWidthValue">100%</output>
    <input id="backgroundImageX" type="number" min="-300" max="300" />
    <input id="backgroundImageY" type="number" min="-300" max="300" />
    <button id="centerBackgroundBtn" type="button">居中</button>
    <button id="coverBackgroundBtn" type="button">铺满</button>
    <button id="clearBackgroundBtn" type="button">重置背景</button>
    <input id="cardColor" type="color" />
    <input id="textColor" type="color" />
    <input id="mutedColor" type="color" />
    <input id="foregroundOpacity" type="range" min="0" max="100" step="1" />
    <output id="foregroundOpacityValue">92%</output>
    <select id="widthMode"><option value="auto">智能自动</option><option value="custom">手动指定</option></select>
    <select id="columns"><option value="1">1 张</option><option value="2">2 张</option><option value="3">3 张</option><option value="4">4 张</option></select>
    <input id="width" type="number" min="520" max="1400" />
    <select id="sectionGapMode"><option value="auto">智能</option><option value="custom">自定义</option></select>
    <input id="sectionGap" type="number" min="0" max="200" />
    <input id="radius" type="number" min="0" max="48" />
    <input id="showUpdatedAt" type="checkbox" />
    <button id="copyStyleBtn" type="button">复制样式</button>
    <button id="resetStyleBtn" type="button">重置样式</button>
    <button id="addSectionBtn" type="button">添加分组</button>
    <div id="sections"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
